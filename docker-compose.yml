# Local stack: n8n, Qdrant, Prometheus, Grafana, Cohere reranker, Neo4j, Graphiti MCP
# Usage: docker compose up -d
# .env: COHERE_API_KEY, NEO4J_PASSWORD, OPENAI_API_KEY (for Graphiti MCP)

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: aml-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
      - NODE_ENV=production
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - aml-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: aml-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - aml-net

  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: aml-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - aml-net

  grafana:
    image: grafana/grafana:10.2.0
    container_name: aml-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - aml-net

  reranker:
    build:
      context: .
      dockerfile: Dockerfile.reranker
    container_name: aml-reranker
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - COHERE_API_KEY=${COHERE_API_KEY:-}
    networks:
      - aml-net

  neo4j:
    image: neo4j:5.15.0
    container_name: aml-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-localdev}
    volumes:
      - neo4j_data:/data
    networks:
      - aml-net

  graphiti-mcp:
    image: zepai/knowledge-graph-mcp:latest
    container_name: aml-graphiti-mcp
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-localdev}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DATABASE_PROVIDER=neo4j
    depends_on:
      - neo4j
    networks:
      - aml-net

volumes:
  n8n_data:
  qdrant_storage:
  prometheus_data:
  grafana_data:
  neo4j_data:

networks:
  aml-net:
    driver: bridge
